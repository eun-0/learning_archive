<!DOCTYPE html>
<html lang="en">
<head>
    <title> Document </title>
</head>

<body>
    <!-- list(목록) -->

    <!-- Unordered List -->
    <ul>
        <li>Apple</li>
        <li>Banana</li>
        <li>Cherry</li>
    </ul>

    <!-- Ordered List -->
    <!-- 태그 속성(attribute) -->
    <ol type="I">
        <li>Apple</li>
        <li>Banana</li>
        <li>Cherry</li>
    </ol>

</body>
</html>
