<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <!-- Internal CSS-->
    <style>
        /* . → 클래스 */
        .contents{
            text-align:center;
        }

        /* # → id */
        #name{
            font-size: x-large;
            font-weight: bold;
        }
        main{
            font-size:medium;
        }
        footer{
            font-size: xx-small;
        }
    </style>
</head>

<body>
    <div class="contents">
        <header id="name"> Phina </header>
        <main>AI 서비스 개발자 </main>
        <footer> Copyright &#169; Phina </footer>
    </div>
</body>

</html>
